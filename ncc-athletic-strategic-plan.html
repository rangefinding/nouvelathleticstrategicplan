<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NCC Athletic Strategic Plan | 2026–2028</title>

<!--
===========================================================================
  NOUVEL CATHOLIC CENTRAL — ATHLETIC STRATEGIC PLAN
  2026–2028 Implementation Timeline
  ---------------------------------------------------------------------------
  HOW TO EDIT:
  Scroll to the <script> tag near the bottom. All content lives in two
  objects: PLAN (pillars, sub-pillars, cells) and APPENDICES (referenceable
  framework documents). Edit the text, commit to GitHub, done. The UI
  re-renders automatically on page load.
  ---------------------------------------------------------------------------
  STATUS VALUES:
    "not-started" | "in-progress" | "complete" | "deferred" | "blocked"
===========================================================================
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">

<style>
:root {
  /* NCC brand */
  --ncc-blue: #1e3a70;
  --ncc-blue-dark: #12254a;
  --ncc-blue-light: #3b5ca0;
  --ncc-silver: #c0c6cf;
  --ncc-silver-light: #e5e8ed;
  --ncc-silver-dark: #8892a0;

  /* Neutrals */
  --ink: #0f172a;
  --ink-muted: #475569;
  --ink-light: #64748b;
  --paper: #fafbfc;
  --card: #ffffff;
  --border: #e2e8f0;
  --border-strong: #cbd5e1;

  /* Status */
  --status-not-started: #94a3b8;
  --status-in-progress: #2563eb;
  --status-complete: #059669;
  --status-deferred: #d97706;
  --status-blocked: #dc2626;

  /* Pillar accents */
  --pillar-1: #1e3a70;
  --pillar-2: #2a5490;
  --pillar-3: #3b6bab;
  --pillar-4: #5481c0;

  --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
  --shadow: 0 4px 12px rgba(15, 23, 42, 0.06);
  --shadow-lg: 0 12px 32px rgba(15, 23, 42, 0.10);

  --radius: 8px;
  --radius-lg: 12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.55;
  color: var(--ink);
  background: var(--paper);
  -webkit-font-smoothing: antialiased;
}

.serif { font-family: 'Fraunces', Georgia, serif; font-optical-sizing: auto; }

/* =========== HEADER =========== */
header.site-header {
  background: linear-gradient(135deg, var(--ncc-blue-dark) 0%, var(--ncc-blue) 100%);
  color: white;
  padding: 2.5rem 2rem 2rem;
  border-bottom: 4px solid var(--ncc-silver);
}

.header-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 2rem;
  flex-wrap: wrap;
}

.title-block h1 {
  font-family: 'Fraunces', serif;
  font-weight: 500;
  font-size: clamp(1.75rem, 3vw, 2.5rem);
  line-height: 1.1;
  letter-spacing: -0.02em;
  margin-bottom: 0.35rem;
}

.title-block .eyebrow {
  font-size: 0.8rem;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ncc-silver);
  margin-bottom: 0.5rem;
}

.title-block .subtitle {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 1.1rem;
  color: rgba(255, 255, 255, 0.85);
}

.header-meta {
  text-align: right;
  font-size: 0.85rem;
  color: var(--ncc-silver-light);
}

.header-meta strong { color: white; font-weight: 600; }

/* =========== NAVIGATION =========== */
nav.controls {
  background: white;
  border-bottom: 1px solid var(--border);
  padding: 1rem 2rem;
  position: sticky;
  top: 0;
  z-index: 50;
  box-shadow: var(--shadow-sm);
}

.controls-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 1.5rem;
  flex-wrap: wrap;
}

.pillar-tabs {
  display: flex;
  gap: 0.25rem;
  background: var(--ncc-silver-light);
  padding: 4px;
  border-radius: var(--radius);
}

.pillar-tab {
  padding: 0.5rem 1rem;
  background: transparent;
  border: none;
  border-radius: 6px;
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--ink-muted);
  cursor: pointer;
  transition: all 0.15s ease;
  white-space: nowrap;
}

.pillar-tab:hover { color: var(--ncc-blue); }
.pillar-tab.active {
  background: white;
  color: var(--ncc-blue);
  box-shadow: var(--shadow-sm);
}

.pillar-tab .num {
  font-family: 'Fraunces', serif;
  font-weight: 600;
  margin-right: 0.35rem;
}

.right-controls { display: flex; gap: 0.75rem; align-items: center; }

.year-switch {
  display: flex;
  gap: 0.25rem;
  background: var(--ncc-silver-light);
  padding: 4px;
  border-radius: var(--radius);
}

.year-btn {
  padding: 0.4rem 0.85rem;
  background: transparent;
  border: none;
  border-radius: 6px;
  font-family: 'Fraunces', serif;
  font-weight: 600;
  font-size: 0.9rem;
  color: var(--ink-muted);
  cursor: pointer;
  transition: all 0.15s;
}
.year-btn:hover { color: var(--ncc-blue); }
.year-btn.active {
  background: white;
  color: var(--ncc-blue);
  box-shadow: var(--shadow-sm);
}

.icon-btn {
  padding: 0.5rem 0.85rem;
  background: white;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--ink-muted);
  cursor: pointer;
  transition: all 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
}
.icon-btn:hover { color: var(--ncc-blue); border-color: var(--ncc-blue); }

/* =========== MAIN =========== */
main {
  max-width: 1400px;
  margin: 0 auto;
  padding: 2rem;
}

.pillar-intro {
  margin-bottom: 1.5rem;
  padding: 1.5rem 1.75rem;
  background: white;
  border: 1px solid var(--border);
  border-left: 4px solid var(--ncc-blue);
  border-radius: var(--radius);
}

.pillar-intro .pillar-label {
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ncc-blue);
  margin-bottom: 0.4rem;
}

.pillar-intro h2 {
  font-family: 'Fraunces', serif;
  font-weight: 500;
  font-size: 1.75rem;
  line-height: 1.15;
  letter-spacing: -0.01em;
  color: var(--ink);
  margin-bottom: 0.5rem;
}

.pillar-intro p {
  color: var(--ink-muted);
  max-width: 65ch;
}

/* =========== GRID =========== */
.grid-wrapper {
  background: white;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow);
}

.grid-scroller { overflow-x: auto; }

table.plan-grid {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8rem;
  min-width: 1100px;
}

table.plan-grid thead th {
  background: var(--ncc-blue-dark);
  color: white;
  font-weight: 500;
  font-family: 'Fraunces', serif;
  letter-spacing: 0.02em;
  padding: 0.75rem 0.5rem;
  text-align: center;
  font-size: 0.78rem;
  text-transform: uppercase;
  border-right: 1px solid rgba(255, 255, 255, 0.08);
}

table.plan-grid thead th:first-child {
  text-align: left;
  padding-left: 1.25rem;
  min-width: 220px;
  background: var(--ncc-blue);
}

table.plan-grid tbody td {
  padding: 0;
  border: 1px solid var(--border);
  vertical-align: top;
  background: white;
  position: relative;
  min-width: 80px;
  height: 80px;
}

table.plan-grid tbody td.sub-pillar-label {
  background: var(--ncc-silver-light);
  padding: 1rem 1.25rem;
  font-weight: 600;
  color: var(--ncc-blue-dark);
  vertical-align: middle;
  min-width: 220px;
  border-right: 2px solid var(--border-strong);
}

td.sub-pillar-label .letter {
  font-family: 'Fraunces', serif;
  font-weight: 700;
  font-size: 1.1rem;
  color: var(--ncc-blue);
  display: inline-block;
  margin-right: 0.4rem;
}

td.sub-pillar-label .name {
  display: block;
  margin-top: 0.15rem;
  font-size: 0.85rem;
  line-height: 1.3;
}

.cell-content {
  width: 100%;
  height: 100%;
  padding: 0.6rem 0.65rem 0.55rem;
  background: transparent;
  border: none;
  text-align: left;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.73rem;
  color: var(--ink);
  line-height: 1.35;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 0.3rem;
  transition: background 0.15s;
  position: relative;
}

.cell-content:hover {
  background: var(--ncc-silver-light);
}

.cell-content:empty::before,
.cell-content.empty::before {
  content: "";
  display: block;
  height: 100%;
}

.cell-text {
  flex: 1;
  color: var(--ink);
}

.cell-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.4rem;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  display: inline-block;
}
.status-dot.not-started { background: var(--status-not-started); }
.status-dot.in-progress { background: var(--status-in-progress); }
.status-dot.complete { background: var(--status-complete); }
.status-dot.deferred { background: var(--status-deferred); }
.status-dot.blocked { background: var(--status-blocked); }

.expand-icon {
  font-size: 0.7rem;
  color: var(--ink-light);
  opacity: 0;
  transition: opacity 0.15s;
}
.cell-content:hover .expand-icon { opacity: 1; }

/* Empty cell styling */
.cell-empty {
  background: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 8px,
    var(--ncc-silver-light) 8px,
    var(--ncc-silver-light) 9px
  );
}

/* =========== DETAIL PANEL (slide-out) =========== */
.detail-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.4);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
  z-index: 100;
}
.detail-overlay.active { opacity: 1; pointer-events: auto; }

.detail-panel {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  width: min(620px, 100%);
  background: white;
  box-shadow: var(--shadow-lg);
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 101;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.detail-panel.active { transform: translateX(0); }

.detail-header {
  padding: 1.75rem 2rem 1.25rem;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(135deg, var(--ncc-blue-dark), var(--ncc-blue));
  color: white;
  position: sticky;
  top: 0;
  z-index: 1;
}

.detail-header .when {
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ncc-silver);
  margin-bottom: 0.5rem;
}

.detail-header h3 {
  font-family: 'Fraunces', serif;
  font-weight: 500;
  font-size: 1.5rem;
  line-height: 1.25;
  letter-spacing: -0.01em;
  margin-bottom: 0.5rem;
}

.detail-header .sub-label {
  font-size: 0.85rem;
  color: var(--ncc-silver-light);
  font-style: italic;
}

.close-btn {
  position: absolute;
  top: 1.25rem;
  right: 1.25rem;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.15);
  border: none;
  color: white;
  font-size: 1.1rem;
  cursor: pointer;
  line-height: 1;
  transition: background 0.15s;
}
.close-btn:hover { background: rgba(255, 255, 255, 0.25); }

.detail-body { padding: 1.75rem 2rem 2rem; flex: 1; }

.detail-section { margin-bottom: 2rem; }
.detail-section:last-child { margin-bottom: 0; }

.section-title {
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ncc-blue);
  margin-bottom: 0.85rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.section-title::after {
  content: "";
  flex: 1;
  height: 1px;
  background: var(--border);
}

.summary-text {
  font-family: 'Fraunces', serif;
  font-weight: 400;
  font-size: 1.05rem;
  line-height: 1.5;
  color: var(--ink);
  font-style: italic;
}

.action-list { list-style: none; padding: 0; }

.action-list li {
  padding: 0.75rem 0 0.75rem 1.5rem;
  border-bottom: 1px solid var(--border);
  position: relative;
  font-size: 0.92rem;
  line-height: 1.5;
  color: var(--ink);
}
.action-list li:last-child { border-bottom: none; }

.action-list li::before {
  content: "›";
  position: absolute;
  left: 0;
  top: 0.75rem;
  color: var(--ncc-blue);
  font-weight: 700;
  font-family: 'Fraunces', serif;
  font-size: 1.05rem;
}

.action-list li.faith {
  background: linear-gradient(90deg, rgba(30, 58, 112, 0.04), transparent);
  padding-left: 1.5rem;
}

.faith-mark {
  display: inline-block;
  color: var(--ncc-blue);
  font-weight: 600;
  margin-right: 0.25rem;
  font-family: 'Fraunces', serif;
}

.faith-box {
  background: linear-gradient(135deg, rgba(30, 58, 112, 0.05), rgba(30, 58, 112, 0.02));
  border-left: 3px solid var(--ncc-blue);
  padding: 1rem 1.25rem;
  border-radius: 0 var(--radius) var(--radius) 0;
}

.faith-box .faith-label {
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ncc-blue);
  margin-bottom: 0.4rem;
  display: flex;
  align-items: center;
  gap: 0.35rem;
}

.faith-box p {
  font-size: 0.92rem;
  line-height: 1.55;
  color: var(--ink);
}

/* Status selector in detail */
.status-selector {
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
}

.status-option {
  padding: 0.4rem 0.85rem;
  background: white;
  border: 1px solid var(--border);
  border-radius: 999px;
  font-family: inherit;
  font-size: 0.8rem;
  color: var(--ink-muted);
  cursor: pointer;
  transition: all 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
}

.status-option:hover { border-color: var(--ncc-blue-light); }

.status-option.selected {
  background: var(--ncc-blue);
  color: white;
  border-color: var(--ncc-blue);
}

.status-option .status-dot {
  width: 7px;
  height: 7px;
}

/* Appendix links */
.appendix-refs { display: flex; flex-direction: column; gap: 0.5rem; }

.appendix-link {
  padding: 0.85rem 1rem;
  background: var(--ncc-silver-light);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  font-family: inherit;
  text-align: left;
  transition: all 0.15s;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 0.75rem;
}

.appendix-link:hover {
  background: white;
  border-color: var(--ncc-blue);
}

.appendix-link .link-text {
  font-weight: 500;
  color: var(--ncc-blue-dark);
  font-size: 0.9rem;
}

.appendix-link .arrow { color: var(--ncc-blue); font-weight: 600; }

/* Appendix content box (expanded) */
.appendix-content {
  margin-top: 0.5rem;
  background: #f8fafb;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem 1.5rem;
  display: none;
}

.appendix-content.open { display: block; }

.appendix-content h4 {
  font-family: 'Fraunces', serif;
  font-weight: 600;
  font-size: 1.1rem;
  margin-bottom: 0.5rem;
  color: var(--ncc-blue-dark);
}

.appendix-content h5 {
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ncc-blue);
  margin-top: 1.1rem;
  margin-bottom: 0.4rem;
}

.appendix-content p { margin-bottom: 0.7rem; font-size: 0.9rem; line-height: 1.55; }
.appendix-content ul, .appendix-content ol {
  padding-left: 1.25rem;
  margin-bottom: 0.7rem;
  font-size: 0.9rem;
  line-height: 1.55;
}
.appendix-content li { margin-bottom: 0.3rem; }
.appendix-content blockquote {
  border-left: 3px solid var(--ncc-blue);
  padding: 0.5rem 0 0.5rem 1rem;
  margin: 0.75rem 0;
  font-style: italic;
  color: var(--ink-muted);
  font-family: 'Fraunces', serif;
}

/* =========== LEGEND =========== */
.legend {
  display: flex;
  gap: 1.5rem;
  padding: 1rem 1.25rem;
  background: white;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 1rem;
  font-size: 0.82rem;
  color: var(--ink-muted);
  flex-wrap: wrap;
  align-items: center;
}

.legend-label {
  font-weight: 600;
  color: var(--ncc-blue);
  font-size: 0.72rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.legend-item { display: flex; align-items: center; gap: 0.4rem; }

/* =========== STUB PILLAR =========== */
.stub-notice {
  margin: 2rem 0;
  padding: 2rem;
  background: linear-gradient(135deg, rgba(30, 58, 112, 0.03), rgba(30, 58, 112, 0.01));
  border: 1px dashed var(--border-strong);
  border-radius: var(--radius-lg);
  text-align: center;
}

.stub-notice h3 {
  font-family: 'Fraunces', serif;
  font-weight: 500;
  font-size: 1.2rem;
  color: var(--ncc-blue-dark);
  margin-bottom: 0.5rem;
}

.stub-notice p {
  color: var(--ink-muted);
  max-width: 55ch;
  margin: 0 auto 1.5rem;
  font-size: 0.95rem;
}

.stub-subpillars {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 0.75rem;
  max-width: 900px;
  margin: 0 auto;
}

.stub-sub {
  background: white;
  padding: 0.9rem 1.1rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  text-align: left;
  font-size: 0.9rem;
  display: flex;
  gap: 0.6rem;
  align-items: baseline;
}

.stub-sub .letter {
  font-family: 'Fraunces', serif;
  font-weight: 700;
  color: var(--ncc-blue);
  font-size: 1rem;
}

/* =========== FOOTER =========== */
footer {
  max-width: 1400px;
  margin: 3rem auto 0;
  padding: 2rem;
  text-align: center;
  font-size: 0.82rem;
  color: var(--ink-light);
  border-top: 1px solid var(--border);
}

footer em { font-family: 'Fraunces', serif; color: var(--ncc-blue); }

/* =========== PRINT =========== */
@media print {
  @page { size: 11in 17in landscape; margin: 0.4in; }

  body { background: white; font-size: 9pt; }
  header.site-header {
    background: white !important;
    color: var(--ncc-blue-dark) !important;
    padding: 0.5rem 0 1rem;
    border-bottom: 2px solid var(--ncc-blue);
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  header.site-header .title-block h1 { color: var(--ncc-blue-dark); }
  header.site-header .title-block .eyebrow { color: var(--ncc-blue); }
  header.site-header .title-block .subtitle { color: var(--ink-muted); }
  header.site-header .header-meta { color: var(--ink-muted); }
  header.site-header .header-meta strong { color: var(--ncc-blue-dark); }

  nav.controls, .close-btn, .detail-overlay, .detail-panel,
  .appendix-link, footer { display: none !important; }

  main { padding: 0.25rem; max-width: none; }

  .pillar-intro {
    page-break-before: always;
    border: 1px solid var(--ncc-blue);
    background: white;
  }
  .pillar-intro:first-of-type { page-break-before: avoid; }

  .legend { break-inside: avoid; }

  table.plan-grid {
    font-size: 7.5pt;
    min-width: 0;
    width: 100%;
    page-break-inside: avoid;
  }

  table.plan-grid thead th {
    background: var(--ncc-blue) !important;
    color: white !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  table.plan-grid tbody td {
    height: auto;
    min-height: 50px;
  }

  .cell-content { cursor: default; }
  .expand-icon { display: none; }

    body: `
      <h4>Purpose</h4>
      <p>Build a <em>relational</em> coaching culture. The primary objective is not information transfer — it is peer feedback, shared problem-solving, and the slow accumulation of trust between coaches across sports and levels. The AD provides framework and agenda in year one. By year three, coaches should be driving much of the content themselves.</p>

      <h5>Cadence &amp; Scope</h5>
      <ul>
        <li><strong>4 meetings per year</strong> — typically February (spring), May (summer planning), August (preseason), November (winter preseason)</li>
        <li><strong>2 hours</strong> each, preferably evening, following a shared meal</li>
        <li><strong>All coaches K–12 invited</strong> — paid and volunteer, head and assistant</li>
      </ul>

      <h5>Standing Agenda (2 hours)</h5>
      <ol>
        <li><strong>Opening Prayer &amp; Mission Moment (10 min)</strong> — Led by a team chaplain, faculty member, or coach on rotation. Tied to a Gospel teaching or saint related to athletics, perseverance, or service.</li>
        <li><strong>Coach Stories (10 min)</strong> — One or two coaches share a moment from the prior quarter where a student-athlete embodied the mission. Character moments, not scoreboard moments.</li>
        <li><strong>Peer Feedback Round (35 min)</strong> — The heart of the meeting. In pairs or small groups, coaches share what's working, what they're struggling with, and give direct peer feedback. Coaches who also teach in the classroom contribute insight on how specific athletes are doing academically and socially — a critical and underused asset.</li>
        <li><strong>Shared Skill Exchange (25 min)</strong> — Rotating practical focus: strength &amp; conditioning (trainer-led), practice design, game-day communication, sport psychology basics, parent management. Led by the AD, a guest, or a coach with relevant expertise.</li>
        <li><strong>State of the Program (10 min)</strong> — AD shares progress against strategic plan metrics. Data-driven, brief.</li>
        <li><strong>Board Touchpoint (10 min, optional)</strong> — A board Athletics Liaison may attend and reinforce support-and-accountability. Not required every meeting; quarterly attendance signals board engagement without becoming oversight theater.</li>
        <li><strong>Commitments &amp; Close (10 min)</strong> — Each coach names one thing they'll apply. Documented and circulated within 48 hours.</li>
      </ol>

      <h5>Evolution Path</h5>
      <p>Year 1 — AD runs full agenda, all segments prescribed. Year 2 — coaches propose focus topics and lead the Skill Exchange segment. Year 3 — coaches host peer visits to each other's practices between meetings; the roundtable becomes the visible tip of an ongoing peer network.</p>

let currentPillar = 1;
let currentYear = 2026;
const statusOptions = [
  { value: 'not-started', label: 'Not Started' },
  { value: 'in-progress', label: 'In Progress' },
  { value: 'complete', label: 'Complete' },
  { value: 'deferred', label: 'Deferred' },
  { value: 'blocked', label: 'Blocked' }
];

/* ============================================================================
   RENDER — NAVIGATION
   ============================================================================ */
function renderPillarTabs() {
  const container = document.getElementById('pillar-tabs');
  container.innerHTML = PLAN.pillars.map(p =>
    `<button class="pillar-tab ${p.id === currentPillar ? 'active' : ''}" onclick="switchPillar(${p.id})">
      <span class="num">${p.id}</span>${p.name}
    </button>`
  ).join('');
}

function renderYearSwitch() {
  const container = document.getElementById('year-switch');
  container.innerHTML = [2026, 2027, 2028].map(y =>
    `<button class="year-btn ${y === currentYear ? 'active' : ''}" onclick="switchYear(${y})">${y}</button>`
  ).join('');
}

function switchPillar(id) {
  currentPillar = id;
  renderPillarTabs();
  renderMain();
}

function switchYear(y) {
  currentYear = y;
  renderYearSwitch();
  renderMain();
}

/* ============================================================================
   RENDER — MAIN CONTENT
   ============================================================================ */
function renderMain() {
  const pillar = PLAN.pillars.find(p => p.id === currentPillar);
  const main = document.getElementById('main');

  let html = `
    <div class="pillar-intro">
      <div class="pillar-label">Pillar ${pillar.id}</div>
      <h2>${pillar.name}</h2>
      <p>${pillar.description}</p>
    </div>
    <div class="legend">
      <span class="legend-label">Status</span>
      ${statusOptions.map(s => `
        <span class="legend-item"><span class="status-dot ${s.value}"></span>${s.label}</span>
      `).join('')}
      <span style="flex:1"></span>
      <span class="legend-item"><span class="faith-mark">✞</span> Faith-integrated action</span>
    </div>
  `;

  if (pillar.stub) {
    html += renderStub(pillar);
  } else {
    html += renderGrid(pillar);
  }

  main.innerHTML = html;
}

function renderGrid(pillar) {
  const cellsKey = currentYear === 2026 ? 'cells' : (currentYear === 2027 ? 'cells2027' : 'cells2028');

  let html = `
    <div class="year-section">
      <div class="year-heading">
        ${currentYear}
        <span class="year-sub">${currentYear === 2026 ? 'Establishment' : (currentYear === 2027 ? 'Refinement' : 'Maturity')}</span>
      </div>
      <div class="grid-wrapper">
        <div class="grid-scroller">
          <table class="plan-grid">
            <thead>
              <tr>
                <th>Sub-Pillar</th>
                ${MONTHS.map(m => `<th>${m}</th>`).join('')}
              </tr>
            </thead>
            <tbody>
              ${pillar.subPillars.map(sub => renderRow(sub, cellsKey)).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;

  return html;
}

function renderRow(sub, cellsKey) {
  const cells = sub[cellsKey] || {};
  let html = `<tr>
    <td class="sub-pillar-label">
      <span class="letter">${sub.id.slice(-1)}</span>
      <span class="name">${sub.name}</span>
    </td>
  `;

  for (let m = 1; m <= 12; m++) {
    const key = `${currentYear}-${String(m).padStart(2, '0')}`;
    const cell = cells[key];

    if (cell) {
      html += `<td>
        <button class="cell-content" onclick="openDetail('${sub.id}','${key}')">
          <div class="cell-text">${cell.summary}</div>
          <div class="cell-footer">
            <span class="status-dot ${cell.status || 'not-started'}"></span>
            <span class="expand-icon">→</span>
          </div>
        </button>
      </td>`;
    } else {
      html += `<td class="cell-empty"></td>`;
    }
  }

  html += `</tr>`;
  return html;
}

function renderStub(pillar) {
  return `
    <div class="stub-notice">
      <h3>Phase 2 Build</h3>
      <p>The structure for Pillar ${pillar.id} is in place and ready for population. Sub-pillars below. Full implementation cells, faith integration, and appendix content to be authored in the next pass — review Pillar 1 first for format and depth before this pillar is populated.</p>
      <div class="stub-subpillars">
        ${pillar.subPillars.map(sp => `
          <div class="stub-sub">
            <span class="letter">${sp.id.slice(-1)}</span>
            <div>
              <strong>${sp.name}</strong>
              <div style="font-size:0.82rem;color:var(--ink-light);margin-top:0.2rem">${sp.note}</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

/* ============================================================================
   DETAIL PANEL
   ============================================================================ */
function openDetail(subId, key) {
  const pillar = PLAN.pillars.find(p => p.id === currentPillar);
  const sub = pillar.subPillars.find(s => s.id === subId);
  const cellsKey = currentYear === 2026 ? 'cells' : (currentYear === 2027 ? 'cells2027' : 'cells2028');
  const cell = sub[cellsKey][key];
  if (!cell) return;

  const [yr, mo] = key.split('-');
  const monthName = MONTH_FULL[parseInt(mo, 10) - 1];

  const panel = document.getElementById('detail-panel');

  let html = `
    <div class="detail-header">
      <button class="close-btn" onclick="closeDetail()">✕</button>
      <div class="when">${monthName} ${yr}</div>
      <h3>${cell.summary}</h3>
      <div class="sub-label">${sub.id} · ${sub.name} · Pillar ${pillar.id}: ${pillar.name}</div>
    </div>
    <div class="detail-body">

      <div class="detail-section">
        <div class="section-title">Status</div>
        <div class="status-selector">
          ${statusOptions.map(s => `
            <button class="status-option ${cell.status === s.value ? 'selected' : ''}"
                    onclick="setStatus('${subId}','${key}','${s.value}')">
              <span class="status-dot ${s.value}"></span>${s.label}
            </button>
          `).join('')}
        </div>
      </div>

      <div class="detail-section">
        <div class="section-title">Action Items</div>
        <ul class="action-list">
          ${cell.actions.map(a => `
            <li class="${a.faith ? 'faith' : ''}">
              ${a.faith ? '<span class="faith-mark">✞</span> ' : ''}${a.text}
            </li>
          `).join('')}
        </ul>
      </div>

      ${cell.faithIntegration ? `
        <div class="detail-section">
          <div class="section-title">Faith Integration</div>
          <div class="faith-box">
            <div class="faith-label"><span class="faith-mark">✞</span> Catholic Identity in This Action</div>
            <p>${cell.faithIntegration}</p>
          </div>
        </div>
      ` : ''}

      ${cell.appendixRefs && cell.appendixRefs.length ? `
        <div class="detail-section">
          <div class="section-title">Resources &amp; Appendices</div>
          <div class="appendix-refs">
            ${cell.appendixRefs.map(ref => {
              const ap = APPENDICES[ref];
              if (!ap) return '';
              return `
                <button class="appendix-link" onclick="toggleAppendix('${ref}')">
                  <span class="link-text">${ap.title}</span>
                  <span class="arrow" id="arrow-${ref}">▾</span>
                </button>
                <div class="appendix-content" id="appendix-${ref}">
                  ${ap.body}
                </div>
              `;
            }).join('')}
          </div>
        </div>
      ` : ''}

    </div>
  `;

  panel.innerHTML = html;
  panel.classList.add('active');
  document.getElementById('detail-overlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('active');
  document.getElementById('detail-overlay').classList.remove('active');
  document.body.style.overflow = '';
}

function toggleAppendix(ref) {
  const content = document.getElementById(`appendix-${ref}`);
  const arrow = document.getElementById(`arrow-${ref}`);
  if (content.classList.contains('open')) {
    content.classList.remove('open');
    arrow.textContent = '▾';
  } else {
    content.classList.add('open');
    arrow.textContent = '▴';
  }
}

function setStatus(subId, key, status) {
  const pillar = PLAN.pillars.find(p => p.id === currentPillar);
  const sub = pillar.subPillars.find(s => s.id === subId);
  const cellsKey = currentYear === 2026 ? 'cells' : (currentYear === 2027 ? 'cells2027' : 'cells2028');
  sub[cellsKey][key].status = status;
  openDetail(subId, key);
  renderMain();
}

  document.getElementById('last-updated').textContent = `${monthNames[today.getMonth()]} ${today.getFullYear()}`;

  // Keyboard support for detail panel
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeDetail();
  });
});
</script>

</body>
</html>
